<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KMBD Portal | RP Einsatzsystem</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="badge">LPK</div>
      <h1>KMBD Portal</h1>
      <p>Landespolizei Köln · Kampfmittelbeseitigungsdienst</p>
      <label>Benutzername</label>
      <input id="username" value="KMBD" autocomplete="username" />
      <label>Passwort</label>
      <input id="password" type="password" value="ausbilder1" autocomplete="current-password" />
      <button onclick="login()">Anmelden</button>
      <small>Demo-Login: KMBD / ausbilder1 · Leitung / leitung123 · Anwärter / test123</small>
    </div>
  </div>

  <main id="desktop" class="desktop hidden">
    <header class="topbar">
      <div><strong>KMBD Einsatzportal</strong><span id="roleLabel"></span></div>
      <div id="clock"></div>
    </header>

    <section class="icons">
      <button class="icon" onclick="openApp('dashboard')"><span>📊</span>Dashboard</button>
      <button class="icon" onclick="openApp('einsatz')"><span>🚨</span>Einsätze</button>
      <button class="icon" onclick="openApp('akten')"><span>👥</span>Personalakten</button>
      <button class="icon" onclick="openApp('dienstplan')"><span>📅</span>Dienstplan</button>
      <button class="icon" onclick="openApp('formulare')"><span>📝</span>Formulare</button>
      <button class="icon" onclick="openApp('material')"><span>🚐</span>Fahrzeuge & Material</button>
      <button class="icon" onclick="openApp('lexikon')"><span>📚</span>Lexikon</button>
      <button class="icon" onclick="openApp('chat')"><span>💬</span>Interner Chat</button>
      <button class="icon" onclick="openApp('admin')"><span>⚙️</span>Verwaltung</button>
    </section>

    <section id="windows"></section>

    <footer class="taskbar">
      <button onclick="toggleStart()">▦ Start</button>
      <div id="openApps"></div>
      <button onclick="logout()">Abmelden</button>
    </footer>

    <aside id="startMenu" class="start-menu hidden">
      <h3>KMBD Menü</h3>
      <button onclick="openApp('dashboard')">Dashboard öffnen</button>
      <button onclick="openApp('einsatz')">Neuen Einsatz erfassen</button>
      <button onclick="openApp('chat')">Chat öffnen</button>
      <button onclick="logout()">Abmelden</button>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
