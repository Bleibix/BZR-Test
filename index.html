<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KMBD Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-panel glass">
      <div class="brand">
        <div class="crest">KM</div>
        <div>
          <h1>KMBD Portal</h1>
          <p>Landespolizei Köln · Interner Arbeitsbereich</p>
        </div>
      </div>
      <label>Benutzername<input id="loginUser" value="KMBD" autocomplete="username"></label>
      <label>Passwort<input id="loginPass" type="password" value="ausbilder1" autocomplete="current-password"></label>
      <button id="loginBtn" class="primary">Anmelden</button>
      <p id="loginError" class="error"></p>
      <div class="login-info">Master: <b>KMBD / ausbilder1</b><br>Weitere Demo-Zugänge: Leitung / leitung123 · Anwärter / test123</div>
    </div>
  </div>

  <main id="desktop" class="desktop hidden">
    <div class="shade"></div>
    <section id="desktopIcons" class="desktop-icons"></section>

    <aside class="right-widgets">
      <div class="widget glass">
        <span class="overline">Bereitschaft</span>
        <strong id="clockBig">--:--</strong>
        <small>KMBD Köln · Status einsatzbereit</small>
      </div>
      <div class="widget glass">
        <span class="overline">Nächster Termin</span>
        <div id="nextEvent" class="next-event">Keine Termine</div>
      </div>
      <div class="widget glass mini-status">
        <div><b id="openCount">0</b><span>offen</span></div>
        <div><b id="teamCount">0</b><span>Personal</span></div>
        <div><b id="msgCount">0</b><span>Chat</span></div>
      </div>
    </aside>

    <section id="windows"></section>

    <nav class="taskbar glass">
      <button id="startBtn" class="start-button" title="Start">▦</button>
      <div class="search-box">KMBD durchsuchen</div>
      <div id="taskApps" class="task-apps"></div>
      <div class="tray"><span id="trayUser"></span><span id="trayTime"></span><button id="logoutBtn" title="Abmelden">⏻</button></div>
    </nav>

    <div id="startMenu" class="start-menu glass hidden">
      <div class="start-top"><b>Start</b><span id="startUser"></span></div>
      <div id="startApps" class="start-grid"></div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
